# fly.toml app configuration file for mindwise
# See https://fly.io/docs/reference/configuration/ for information

app = 'mindwise'
primary_region = 'sin'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  dockerfile = "backend/Dockerfile"

[processes]
  web = "gunicorn --bind :8080 --workers 1 app:app"
  worker = "gunicorn --bind :8080 --workers 1 worker:app"
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # Keep at least one web machine running
  processes = ["web"] # Only the 'web' process should receive public traffic

[[vm]]
  # This section defines the VM for the 'web' process.
  # Smallest, cheapest instance.
  processes = ["web"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  # This section defines the VM for the 'worker' process.
  # Larger, more powerful instance.
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
  min_machines_running = 1

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["worker"]
  [services.ports]
    port = 8080
    handlers = ["tcp"] # <--- ENSURE NO EXTRA CHARACTERS HERE