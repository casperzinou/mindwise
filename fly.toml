# fly.toml app configuration file for mindwise
# See https://fly.io/docs/reference/configuration/ for information

app = 'mindwise'
primary_region = 'sin'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  dockerfile = "backend/Dockerfile"

[processes]
  # Only the 'web' process is needed now, handling all operations.
  # Using gunicorn for a production Flask application.
  web = "gunicorn --bind :8080 --workers 1 app:app" 

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # Keep at least one web machine running
  processes = ["web"] # Only the 'web' process should receive public traffic

[[vm]]
  # This section defines the VM for the consolidated 'web' process.
  # Increased memory to handle combined scraping, embedding, and API serving workload.
  processes = ["web"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048 # Critical change: Increased memory allocation to 2GB