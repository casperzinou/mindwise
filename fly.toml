# fly.toml app configuration file for mindwise
# See https://fly.io/docs/reference/configuration/ for information

app = 'mindwise'
primary_region = 'sin'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  # The Dockerfile is now in the root of the project
  dockerfile = "Dockerfile"

[processes]
  # Use a production-ready gunicorn command with gevent workers for better concurrency
  web = "gunicorn -w 4 -k gevent --bind :8080 app:app" 

[http_service]
  internal_port = 8080
  force_https = true
  
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # Keep at least one web machine running
  processes = ["web"] # Only the 'web' process should receive public traffic

  

[[vm]]
  # This section defines the VM for the 'web' process.
  # 2GB of memory is a great starting point.
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048