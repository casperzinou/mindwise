<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - MindWise</title>
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Link to the consolidated style.css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- <script src="{{ url_for('static', filename='script.js') }}"></script> This line is commented out as it was not present in the original 404.html -->
    <style>
        /* Specific styles for the 404 page, building on top of global styles */
        .error-404-main {
            min-height: calc(100vh - 120px); /* Adjust height to fill space above footer */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 0; /* Add some padding */
        }

        .error-404-content {
            background-color: var(--bg-card); /* Dark card background */
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 60px; /* Generous padding */
            max-width: 600px;
            width: 100%;
            box-shadow: var(--shadow-dark); /* Prominent shadow */
            margin: 0 auto;
        }

        .error-404-content h1 {
            font-size: 90px; /* Very large 404 number */
            color: var(--accent-blue); /* Accent color for the number */
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.4); /* Subtle glow */
        }

        .error-404-content h2 {
            font-size: 48px; /* "Page Not Found" text */
            margin-bottom: 30px;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: -0.04em;
        }

        .error-404-content p {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: none; /* Override default paragraph max-width */
        }

        /* Adjust button to fit the context */
        .error-404-content .btn {
            padding: 18px 40px; /* Larger button */
            font-size: 18px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .error-404-content {
                padding: 40px;
            }
            .error-404-content h1 {
                font-size: 70px;
            }
            .error-404-content h2 {
                font-size: 38px;
            }
            .error-404-content p {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .error-404-content {
                padding: 30px;
                border-radius: 12px;
            }
            .error-404-content h1 {
                font-size: 50px;
            }
            .error-404-content h2 {
                font-size: 28px;
            }
            .error-404-content p {
                font-size: 16px;
            }
            .error-404-content .btn {
                padding: 15px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container">
            <a href="{{ url_for('dashboard') }}" class="logo">MindWise</a> <!-- Link to dashboard if logged in, or index -->
            <nav class="main-nav">
                <ul>
                    <li class="nav-links"><a href="{{ url_for('logout') }}">Logout</a></li>
                    <!-- Add other nav links if appropriate for error page, or simplify -->
                </ul>
            </nav>
        </div>
    </header>

    <main class="error-404-main">
        <div class="container">
            <div class="error-404-content">
                <h1>404</h1>
                <h2>Page Not Found</h2>
                <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Please check the URL for typos.</p>
                <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Homepage</a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>© 2025 MindWise. All rights reserved. | <a href="{{ url_for('privacy') }}">Privacy Policy</a> | <a href="{{ url_for('terms') }}">Terms of Service</a> | <a href="{{ url_for('refund') }}">Refund Policy</a></p>
        </div>
    </footer>

</body>
</html>
