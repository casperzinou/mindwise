<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MindWise</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <a href="/index.html" class="logo">MindWise</a>
        </div>
    </header>

    <main>
        <section class="auth-section section-centered">
            <div class="container">
                <div class="auth-card">
                    <h2>Create Your Account</h2>

                    <!-- NOTE: Flash messages are removed for static site compatibility -->
                    <div id="message-area"></div>

                    <form method="POST" action="/register"> <!-- This will post to your Fly.io backend -->
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" class="form-input" required autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" class="form-input" required autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirm Password</label>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-input" required autocomplete="new-password">
                        </div>
                        <div class="form-group" style="margin-top: 32px;">
                            <button type="submit" class="btn btn-primary">Register for $1 Trial</button>
                        </div>
                    </form>
                    <p class="form-footer-link">
                        Already have an account? <a href="/login.html">Log In</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>© 2025 MindWise. All rights reserved. | <a href="/privacy.html">Privacy Policy</a> | <a href="/terms.html">Terms of Service</a></p>
        </div>
    </footer>

</body>
</html>
